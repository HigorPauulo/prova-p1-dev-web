<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <header class="bg-primary text-white p-3 text-center">
        <h1 class="logo">Gerenciador de Tarefas</h1>
    </header>

    <main class="py-5">
        <div class="container">
            <div class="row row-gap-5">
                <div class="col-12 col-md-5">
                    <h2 class="text-start text-md-center title-section mb-4">Adicionar Tarefa</h2>
                    <div class="input-group">
                        <input type="text" class="form-control" placeholder="Digite a tarefa" id="tarefa">
                        <button class="btn btn-primary" onclick="adicionarTarefa()">Adicionar</button>
                    </div>
                </div>

                <div class="col-12 col-md-7">
                    <h2 class="text-start text-md-center title-section mb-4">Lista de Tarefas</h2>
                    <ul class="list-group d-flex flex-column gap-2" id="lista"></ul>
                </div>
 
            </div>            
        </div>
    </main>
    
    <footer class="footer-main bg-dark text-white py-3 text-center">
        <p>Gerenciador de Tarefas - 2026</p>        
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
